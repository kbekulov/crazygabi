<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Gabi</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260528-overlay-hud" />
  </head>
  <body>
    <main id="shell">
      <section id="game-wrap" aria-label="Crazy Gabi game">
        <div id="hud">
          <div class="hud-cluster hud-top-left">
            <div id="lives" class="hud-lives" aria-label="Lives"></div>
            <span class="hud-divider"></span>
            <div class="hud-timer"><span class="label">TIME</span><strong id="time">150</strong></div>
          </div>
          <div class="hud-cluster hud-top-right">
            <div class="hud-counter">
              <img id="coin-icon" alt="" />
              <strong id="gems">00</strong>
            </div>
            <span class="hud-divider"></span>
            <div class="hud-counter">
              <img id="key-icon" alt="" />
              <strong id="key">00</strong>
            </div>
          </div>
          <div class="hud-equipped">
            <img id="equipped-icon" alt="" />
            <div>
              <span class="label">ITEM</span>
              <strong id="equipped-name">NONE</strong>
            </div>
          </div>
          <div class="hud-score">
            <span class="label">SCORE</span>
            <strong id="score">000000</strong>
          </div>
        </div>
        <div id="game"></div>
        <div id="loading" class="loading-panel" role="status" aria-live="polite">
          <h1>Loading</h1>
          <div class="loading-track"><span id="loading-bar"></span></div>
          <p id="loading-text">Preparing assets...</p>
        </div>
        <div id="message" class="panel" hidden>
          <h1>Crazy Gabi</h1>
          <p>Collect the coins, grab the brass key, and reach the door before the city gets too wild.</p>
          <button id="start-button" type="button" disabled>Start</button>
        </div>
        <div id="story-intro" class="story-intro" hidden>
          <div class="story-backdrop"></div>
          <div id="story-panels" class="story-panels"></div>
          <button id="story-start" class="story-start" type="button" hidden>Start</button>
        </div>
        <div id="item-pickup" class="item-pickup" hidden>
          <div class="item-card">
            <img id="item-pickup-image" alt="" />
            <h2 id="item-pickup-name">Acorn Basket</h2>
            <p id="item-pickup-instruction">Press Enter to throw acorns</p>
            <button id="item-pickup-ok" type="button">OK</button>
          </div>
        </div>
        <div id="cheat-menu" class="panel cheat-panel" hidden>
          <h1>Level Select</h1>
          <p>Jump directly to a level for testing.</p>
          <div id="cheat-levels" class="cheat-levels"></div>
          <button id="cheat-close" type="button">Close</button>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js?v=20260528-overlay-hud"></script>
  </body>
</html>
