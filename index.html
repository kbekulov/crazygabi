<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Gabi</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260522-starting-house-large" />
  </head>
  <body>
    <main id="shell">
      <section id="game-wrap" aria-label="Crazy Gabi game">
        <div id="hud">
          <div><span class="label">1UP</span><strong id="score">000000</strong></div>
          <div><span class="label">HI</span><strong>030000</strong></div>
          <div><span class="label">TIME</span><strong id="time">150</strong></div>
          <div><span class="label">GABI</span><strong id="lives">x3</strong></div>
          <div><span class="label">COIN</span><strong id="gems">x00</strong></div>
          <div><span class="label">KEY</span><strong id="key">x00</strong></div>
        </div>
        <div id="game"></div>
        <div id="message" class="panel">
          <h1>Crazy Gabi</h1>
          <p>Collect the coins, grab the brass key, and reach the door before the city gets too wild.</p>
          <button id="start-button" type="button">Start</button>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js?v=20260522-starting-house-large"></script>
  </body>
</html>
