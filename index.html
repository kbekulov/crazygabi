<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Gabi</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="shell">
      <section id="game-wrap" aria-label="Crazy Gabi game">
        <div id="hud">
          <div><span class="label">Score</span><strong id="score">0000</strong></div>
          <div><span class="label">Gems</span><strong id="gems">0/0</strong></div>
          <div><span class="label">Lives</span><strong id="lives">3</strong></div>
          <div><span class="label">Key</span><strong id="key">No</strong></div>
        </div>
        <div id="game"></div>
        <div id="message" class="panel">
          <h1>Crazy Gabi</h1>
          <p>Collect the gems, grab the brass key, and reach the door before the workshop gets too wild.</p>
          <button id="start-button" type="button">Start</button>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
